name: Build

on:
  push:
    branches:
      - master
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DETSYS_IDS_TELEMETRY: disabled
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          diagnostic-endpoint: ""

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-gha-cache: enabled
          use-flakehub: disabled
          diagnostic-endpoint: ""

      - name: Update flake lock
        if: github.event_name != 'push'
        id: update
        run: |
          nix flake update

          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: github.event_name == 'push' || steps.update.outputs.changed == 'true'
        run: nix build .

      - name: Commit lockfile
        if: github.event_name != 'push' && steps.update.outputs.changed == 'true'
        id: commit
        run: |
          tag="v$(date -u +%Y.%m.%d)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "chore: update nixpkgs for ${tag}"
          git tag -a "$tag" -m "$tag"
          git push origin HEAD:master
          git push origin "$tag"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Release
        if: github.event_name != 'push' && steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.commit.outputs.tag }}" result/bin/* \
            --notes-file result/release.txt \
            --title "${{ steps.commit.outputs.tag }}" \
            --verify-tag
