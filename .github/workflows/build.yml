name: Build

on:
  push:
    branches:
      - master
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      changed: ${{ steps.update.outputs.changed || 'false' }}
      should_build: ${{ steps.decision.outputs.should_build }}
      tag: ${{ steps.meta.outputs.tag }}
    env:
      DETSYS_IDS_TELEMETRY: disabled
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          diagnostic-endpoint: ""

      - name: Update flake lock
        if: github.event_name != 'push'
        id: update
        run: |
          nix flake update

          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload flake lock
        if: github.event_name != 'push' && steps.update.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: flake-lock
          path: flake.lock

      - name: Set metadata
        id: meta
        run: echo "tag=v$(date -u +%Y.%m.%d)" >> "$GITHUB_OUTPUT"

      - name: Decide build
        id: decision
        run: |
          if [[ "${{ github.event_name }}" == "push" || "${{ steps.update.outputs.changed }}" == "true" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: i686-unknown-linux-musl
            runner: ubuntu-24.04
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      DETSYS_IDS_TELEMETRY: disabled
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          diagnostic-endpoint: ""

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-gha-cache: enabled
          use-flakehub: disabled
          diagnostic-endpoint: ""

      - name: Download flake lock
        if: github.event_name != 'push' && needs.prepare.outputs.changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: flake-lock
          path: .

      - name: Build
        run: nix build ".#release-${{ matrix.target }}"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: static-binaries-${{ matrix.target }}
          path: result/bin/*

      - name: Upload release notes
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: result/release.txt

  release:
    needs:
      - prepare
      - build
    if: github.event_name != 'push' && needs.prepare.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download flake lock
        uses: actions/download-artifact@v4
        with:
          name: flake-lock
          path: .

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: static-binaries-*
          path: artifacts
          merge-multiple: true

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: artifacts

      - name: Commit lockfile and release
        run: |
          tag="${{ needs.prepare.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "chore: update nixpkgs for ${tag}"
          git tag -a "$tag" -m "$tag"
          git push origin HEAD:master
          git push origin "$tag"

          assets=()
          while IFS= read -r -d '' asset; do
            assets+=("$asset")
          done < <(find artifacts -maxdepth 1 -type f ! -name release.txt -print0)

          gh release create "$tag" "${assets[@]}" \
            --notes-file artifacts/release.txt \
            --title "$tag" \
            --verify-tag
